name: CI - Legal Brief Writer

on:
  push:
    paths:
      - "95-legal-brief-writer/**"
  pull_request:
    paths:
      - "95-legal-brief-writer/**"

defaults:
  run:
    working-directory: 95-legal-brief-writer

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('95-legal-brief-writer/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint - syntax check
        run: |
          python -m py_compile src/brief_writer/core.py
          python -m py_compile src/brief_writer/cli.py
          python -m py_compile src/brief_writer/api.py
          python -m py_compile src/brief_writer/config.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=src/brief_writer --cov-report=term-missing
