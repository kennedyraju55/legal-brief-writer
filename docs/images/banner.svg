<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f0d48a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="796" height="196" rx="15" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>
  <!-- Scale icon -->
  <text x="180" y="115" font-size="64" text-anchor="middle" fill="#c9a84c">⚖️</text>
  <!-- Title -->
  <text x="440" y="90" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="url(#gold)" text-anchor="middle">Legal Brief Writer</text>
  <!-- Subtitle -->
  <text x="440" y="125" font-family="Arial, sans-serif" font-size="18" fill="#a0a0b0" text-anchor="middle">AI-Powered Legal Brief &amp; Memoranda Generation</text>
  <!-- Privacy badge -->
  <rect x="340" y="140" width="200" height="28" rx="14" fill="#1b5e20" opacity="0.8"/>
  <text x="440" y="159" font-family="Arial, sans-serif" font-size="13" fill="#a5d6a7" text-anchor="middle">🔒 100% Local Processing</text>
  <!-- Decorative lines -->
  <line x1="240" y1="50" x2="640" y2="50" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="170" x2="620" y2="170" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
</svg>
