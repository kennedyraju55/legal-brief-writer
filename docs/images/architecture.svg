<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="12" fill="url(#bg2)"/>
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#c9a84c" text-anchor="middle">System Architecture</text>
  <!-- User Layer -->
  <rect x="280" y="55" width="240" height="45" rx="8" fill="#2d1b4e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="83" font-family="Arial, sans-serif" font-size="15" fill="#e0e0e0" text-anchor="middle">👤 User (Attorney)</text>
  <!-- Interfaces -->
  <rect x="40" y="130" width="160" height="50" rx="8" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="120" y="160" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">🖥️ CLI (Click+Rich)</text>
  <rect x="240" y="130" width="160" height="50" rx="8" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="320" y="160" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">🌐 Web UI (Streamlit)</text>
  <rect x="440" y="130" width="160" height="50" rx="8" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="520" y="160" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0" text-anchor="middle">🔌 REST API (FastAPI)</text>
  <!-- Arrows from user -->
  <line x1="330" y1="100" x2="120" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="320" y2="130" stroke="#555" stroke-width="1.5"/>
  <line x1="470" y1="100" x2="520" y2="130" stroke="#555" stroke-width="1.5"/>
  <!-- Core Engine -->
  <rect x="200" y="215" width="400" height="55" rx="10" fill="#2d1b4e" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="248" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#c9a84c" text-anchor="middle">⚖️ Brief Writer Core Engine</text>
  <!-- Arrows to core -->
  <line x1="120" y1="180" x2="300" y2="215" stroke="#666" stroke-width="1.5"/>
  <line x1="320" y1="180" x2="380" y2="215" stroke="#666" stroke-width="1.5"/>
  <line x1="520" y1="180" x2="500" y2="215" stroke="#666" stroke-width="1.5"/>
  <!-- Modules -->
  <rect x="40" y="300" width="140" height="40" rx="6" fill="#1b4332" stroke="#66bb6a" stroke-width="1"/>
  <text x="110" y="325" font-family="Arial, sans-serif" font-size="11" fill="#c8e6c9" text-anchor="middle">📝 Brief Writer</text>
  <rect x="200" y="300" width="140" height="40" rx="6" fill="#1b4332" stroke="#66bb6a" stroke-width="1"/>
  <text x="270" y="325" font-family="Arial, sans-serif" font-size="11" fill="#c8e6c9" text-anchor="middle">📋 Memo Writer</text>
  <rect x="360" y="300" width="140" height="40" rx="6" fill="#1b4332" stroke="#66bb6a" stroke-width="1"/>
  <text x="430" y="325" font-family="Arial, sans-serif" font-size="11" fill="#c8e6c9" text-anchor="middle">🔍 IRAC Analyzer</text>
  <rect x="520" y="300" width="140" height="40" rx="6" fill="#1b4332" stroke="#66bb6a" stroke-width="1"/>
  <text x="590" y="325" font-family="Arial, sans-serif" font-size="11" fill="#c8e6c9" text-anchor="middle">✍️ Writing Improver</text>
  <!-- Arrows to modules -->
  <line x1="300" y1="270" x2="110" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="350" y1="270" x2="270" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="450" y1="270" x2="430" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="500" y1="270" x2="590" y2="300" stroke="#555" stroke-width="1"/>
  <!-- Ollama -->
  <rect x="640" y="215" width="140" height="55" rx="10" fill="#4a1942" stroke="#e040fb" stroke-width="1.5"/>
  <text x="710" y="238" font-family="Arial, sans-serif" font-size="12" fill="#f8bbd0" text-anchor="middle">🦙 Ollama</text>
  <text x="710" y="257" font-family="Arial, sans-serif" font-size="11" fill="#ce93d8" text-anchor="middle">Gemma 4 (Local)</text>
  <!-- Arrow core to Ollama -->
  <line x1="600" y1="242" x2="640" y2="242" stroke="#e040fb" stroke-width="2"/>
  <!-- Privacy box -->
  <rect x="620" y="300" width="160" height="40" rx="6" fill="#1b5e20" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="700" y="325" font-family="Arial, sans-serif" font-size="12" fill="#a5d6a7" text-anchor="middle">🔒 100% Local</text>
  <!-- Network boundary -->
  <rect x="15" y="45" width="770" height="350" rx="12" fill="none" stroke="#c9a84c" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
  <text x="85" y="385" font-family="Arial, sans-serif" font-size="10" fill="#c9a84c" opacity="0.5">Local Machine Boundary — No Data Leaves</text>
</svg>
