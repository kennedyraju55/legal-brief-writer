    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" rx="12" fill="url(#bg3)"/>
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#c9a84c" text-anchor="middle">Key Features</text>
  <!-- Feature 1 -->
  <rect x="30" y="60" width="230" height="110" rx="10" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="145" y="90" font-size="28" text-anchor="middle">📝</text>
  <text x="145" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0" text-anchor="middle">Brief Writing</text>
  <text x="145" y="135" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">9 brief types including trial,</text>
  <text x="145" y="150" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">appellate, and amicus briefs</text>
  <!-- Feature 2 -->
  <rect x="285" y="60" width="230" height="110" rx="10" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="400" y="90" font-size="28" text-anchor="middle">📋</text>
  <text x="400" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0" text-anchor="middle">Memoranda</text>
  <text x="400" y="135" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">Legal memoranda with proper</text>
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">structure and IRAC analysis</text>
  <!-- Feature 3 -->
  <rect x="540" y="60" width="230" height="110" rx="10" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="655" y="90" font-size="28" text-anchor="middle">🔍</text>
  <text x="655" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0" text-anchor="middle">IRAC Analysis</text>
  <text x="655" y="135" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">Issue, Rule, Application,</text>
  <text x="655" y="150" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">Conclusion framework</text>
  <!-- Feature 4 -->
  <rect x="30" y="195" width="230" height="110" rx="10" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="145" y="225" font-size="28" text-anchor="middle">✍️</text>
  <text x="145" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0" text-anchor="middle">Writing Improvement</text>
  <text x="145" y="270" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">AI-powered editing for clarity,</text>
  <text x="145" y="285" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">precision, and legal style</text>
  <!-- Feature 5 -->
  <rect x="285" y="195" width="230" height="110" rx="10" fill="#1b3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="400" y="225" font-size="28" text-anchor="middle">📚</text>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0" text-anchor="middle">Templates Library</text>
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">Structured templates for all</text>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="11" fill="#a0a0b0" text-anchor="middle">major brief and memo types</text>
  <!-- Feature 6 -->
  <rect x="540" y="195" width="230" height="110" rx="10" fill="#1b5e20" stroke="#66bb6a" stroke-width="2"/>
  <text x="655" y="225" font-size="28" text-anchor="middle">🔒</text>
  <text x="655" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#a5d6a7" text-anchor="middle">100% Private</text>
  <text x="655" y="270" font-family="Arial, sans-serif" font-size="11" fill="#81c784" text-anchor="middle">All data stays on your machine.</text>
  <text x="655" y="285" font-family="Arial, sans-serif" font-size="11" fill="#81c784" text-anchor="middle">Attorney-client privilege safe.</text>
  <!-- Bottom border -->
  <line x1="50" y1="325" x2="750" y2="325" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <text x="400" y="343" font-family="Arial, sans-serif" font-size="11" fill="#c9a84c" text-anchor="middle" opacity="0.6">Powered by Gemma 4 via Ollama — Local LLM Processing</text>
